<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理面板 - WANG KAI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', 'Noto Sans SC', sans-serif;
        }
    </style>
</head>
<body class="bg-zinc-50 min-h-screen">
    <nav class="bg-white border-b border-black/5 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-4">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                <span class="font-black text-lg tracking-tighter uppercase italic">WK Admin</span>
            </div>
            <div class="flex items-center space-x-6">
                <button onclick="showSection('projects')" id="btn-projects" class="text-sm font-bold uppercase tracking-wider hover:text-black text-black transition-colors">
                    作品管理
                </button>
                <button onclick="showSection('contacts')" id="btn-contacts" class="text-sm font-bold uppercase tracking-wider hover:text-black text-zinc-400 transition-colors">
                    留言查看
                </button>
                <button onclick="location.href='index.html'" class="text-sm font-bold uppercase tracking-wider hover:text-black text-zinc-400 transition-colors">
                    返回主页
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <section id="projects-section">
            <div class="mb-8">
                <h1 class="text-4xl md:text-5xl font-black tracking-tighter uppercase mb-2">作品管理</h1>
                <p class="text-zinc-500">添加和管理你的作品展示</p>
            </div>

            <div class="bg-white rounded-3xl p-8 md:p-10 border border-black/5 mb-8">
                <h2 class="text-2xl font-black mb-6 uppercase italic">添加新作品</h2>
                <form id="projectForm" class="space-y-6">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold uppercase tracking-wider mb-2 text-zinc-700">项目名称 *</label>
                            <input type="text" id="projectTitle" required
                                class="w-full px-6 py-4 rounded-xl border border-black/10 focus:border-black focus:outline-none transition-colors"
                                placeholder="例如：Dynamic Visual Website">
                        </div>
                        <div>
                            <label class="block text-sm font-bold uppercase tracking-wider mb-2 text-zinc-700">项目描述 *</label>
                            <input type="text" id="projectDescription" required
                                class="w-full px-6 py-4 rounded-xl border border-black/10 focus:border-black focus:outline-none transition-colors"
                                placeholder="简短描述你的项目">
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-sm font-bold uppercase tracking-wider mb-2 text-zinc-700">技术标签</label>
                            <input type="text" id="projectTags"
                                class="w-full px-6 py-4 rounded-xl border border-black/10 focus:border-black focus:outline-none transition-colors"
                                placeholder="例如：Gemini, Tailwind CSS (逗号分隔)">
                        </div>
                        <div>
                            <label class="block text-sm font-bold uppercase tracking-wider mb-2 text-zinc-700">日期</label>
                            <input type="date" id="projectDate"
                                class="w-full px-6 py-4 rounded-xl border border-black/10 focus:border-black focus:outline-none transition-colors">
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-bold uppercase tracking-wider mb-2 text-zinc-700">图片URL</label>
                        <input type="url" id="projectImage"
                            class="w-full px-6 py-4 rounded-xl border border-black/10 focus:border-black focus:outline-none transition-colors"
                            placeholder="https://example.com/image.png">
                    </div>

                    <div>
                        <label class="block text-sm font-bold uppercase tracking-wider mb-2 text-zinc-700">项目链接</label>
                        <input type="url" id="projectLink"
                            class="w-full px-6 py-4 rounded-xl border border-black/10 focus:border-black focus:outline-none transition-colors"
                            placeholder="https://example.com/project">
                    </div>

                    <button type="submit"
                        class="w-full py-4 bg-black text-white rounded-xl font-bold uppercase tracking-widest hover:bg-zinc-800 transition-colors">
                        添加作品
                    </button>
                </form>
                <div id="projectStatus" class="mt-4 text-center text-sm font-mono hidden"></div>
            </div>

            <div class="bg-white rounded-3xl p-8 md:p-10 border border-black/5">
                <h2 class="text-2xl font-black mb-6 uppercase italic">现有作品</h2>
                <div id="projectsList" class="space-y-4">
                    <div class="text-center py-12 text-zinc-400">
                        <svg class="w-12 h-12 mx-auto mb-4 text-zinc-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        <p>正在加载作品...</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="contacts-section" class="hidden">
            <div class="mb-8">
                <h1 class="text-4xl md:text-5xl font-black tracking-tighter uppercase mb-2">留言查看</h1>
                <p class="text-zinc-500">查看访客的留言和联系信息</p>
            </div>

            <div class="bg-white rounded-3xl p-8 md:p-10 border border-black/5">
                <h2 class="text-2xl font-black mb-6 uppercase italic">最近留言</h2>
                <div id="contactsList" class="space-y-4">
                    <div class="text-center py-12 text-zinc-400">
                        <svg class="w-12 h-12 mx-auto mb-4 text-zinc-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                        <p>正在加载留言...</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 px-8 py-3 bg-black text-white text-sm font-bold rounded-full opacity-0 pointer-events-none transition-all transform translate-y-8 z-[100]">
        操作成功
    </div>

    <script>
        const SUPABASE_URL = 'https://zwmpipsoeshhgusvgemh.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_CYKA0VrB_n8J5fbBAUwFRQ_OaUe3uPo';

        async function request(method, url, data = null, headers = {}) {
            const defaultHeaders = {
                'Content-Type': 'application/json',
                'Authorization': `Bearer ${SUPABASE_KEY}`,
                'apikey': SUPABASE_KEY
            };

            const response = await fetch(`${SUPABASE_URL}/rest/v1${url}`, {
                method: method,
                headers: { ...defaultHeaders, ...headers },
                body: data ? JSON.stringify(data) : null
            });

            if (!response.ok) {
                const error = await response.json().catch(() => ({ message: response.statusText }));
                throw new Error(error.message || 'Request failed');
            }

            return response.json();
        }

        async function fetchProjects() {
            try {
                const data = await request('GET', '/projects?order=created_at.desc');
                return data;
            } catch (error) {
                console.error('Error:', error);
                return [];
            }
        }

        async function insertProject(projectData) {
            try {
                const data = await request('POST', '/projects', projectData);
                return { success: true, data };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        async function deleteProject(id) {
            try {
                await request('DELETE', `/projects?id=eq.${id}`);
                return { success: true };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        async function fetchContacts() {
            try {
                const data = await request('GET', '/contacts?order=created_at.desc');
                return data;
            } catch (error) {
                console.error('Error:', error);
                return [];
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0', 'translate-y-8', 'pointer-events-none');
            toast.classList.add('opacity-100', 'translate-y-0');
            setTimeout(() => {
                toast.classList.add('opacity-0', 'translate-y-8', 'pointer-events-none');
                toast.classList.remove('opacity-100', 'translate-y-0');
            }, 2500);
        }

        function showSection(section) {
            document.getElementById('projects-section').classList.add('hidden');
            document.getElementById('contacts-section').classList.add('hidden');
            document.getElementById(`${section}-section`).classList.remove('hidden');

            document.getElementById('btn-projects').classList.remove('text-black');
            document.getElementById('btn-projects').classList.add('text-zinc-400');
            document.getElementById('btn-contacts').classList.remove('text-black');
            document.getElementById('btn-contacts').classList.add('text-zinc-400');

            document.getElementById(`btn-${section}`).classList.add('text-black');
            document.getElementById(`btn-${section}`).classList.remove('text-zinc-400');
        }

        document.getElementById('projectForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const title = document.getElementById('projectTitle').value;
            const description = document.getElementById('projectDescription').value;
            const tags = document.getElementById('projectTags').value;
            const date = document.getElementById('projectDate').value;
            const image = document.getElementById('projectImage').value;
            const link = document.getElementById('projectLink').value;

            const statusEl = document.getElementById('projectStatus');
            statusEl.classList.remove('hidden', 'text-red-500', 'text-green-500');
            statusEl.classList.add('text-zinc-500');
            statusEl.innerText = '正在添加...';

            const result = await insertProject({
                title,
                description,
                tags: tags || null,
                image_url: image || null,
                project_link: link || null,
                created_at: date ? new Date(date).toISOString() : new Date().toISOString()
            });

            if (result.success) {
                statusEl.classList.remove('text-zinc-500');
                statusEl.classList.add('text-green-500');
                statusEl.innerText = '✓ 作品添加成功！';
                showToast('作品添加成功！');
                document.getElementById('projectForm').reset();
                loadProjects();

                setTimeout(() => {
                    statusEl.classList.add('hidden');
                }, 3000);
            } else {
                statusEl.classList.remove('text-zinc-500');
                statusEl.classList.add('text-red-500');
                statusEl.innerText = '✗ 添加失败: ' + result.error;
            }
        });

        async function loadProjects() {
            const projects = await fetchProjects();
            const container = document.getElementById('projectsList');

            if (projects.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-zinc-400">
                        <svg class="w-12 h-12 mx-auto mb-4 text-zinc-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                        <p>暂无作品，点击上方表单添加</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = projects.map(project => `
                <div class="flex items-center justify-between p-6 bg-zinc-50 rounded-2xl border border-black/5 hover:border-black/10 transition-colors">
                    <div class="flex-1">
                        <h3 class="font-bold text-lg">${project.title}</h3>
                        <p class="text-sm text-zinc-500 mt-1">${project.description || '无描述'}</p>
                        <div class="flex items-center gap-4 mt-2">
                            ${project.tags ? `<span class="text-xs bg-black text-white px-2 py-1 rounded">${project.tags}</span>` : ''}
                            <span class="text-xs text-zinc-400">${new Date(project.created_at).toLocaleDateString('zh-CN')}</span>
                        </div>
                    </div>
                    <button onclick="confirmDelete(${project.id}, '${project.title}')"
                        class="ml-4 px-4 py-2 text-sm font-bold text-red-500 hover:bg-red-50 rounded-lg transition-colors">
                        删除
                    </button>
                </div>
            `).join('');
        }

        async function confirmDelete(id, title) {
            if (confirm(`确定要删除 "${title}" 吗？`)) {
                const result = await deleteProject(id);
                if (result.success) {
                    showToast('作品已删除');
                    loadProjects();
                } else {
                    alert('删除失败: ' + result.error);
                }
            }
        }

        async function loadContacts() {
            const contacts = await fetchContacts();
            const container = document.getElementById('contactsList');

            if (contacts.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-zinc-400">
                        <svg class="w-12 h-12 mx-auto mb-4 text-zinc-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 12h.01M12 12h.01M16 12h.01M21 12c0 4.418-4.03 8-9 8a9.863 9.863 0 01-4.255-.949L3 20l1.395-3.72C3.512 15.042 3 13.574 3 12c0-4.418 4.03-8 9-8s9 3.582 9 8z"></path></svg>
                        <p>暂无留言</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = contacts.map(contact => `
                <div class="p-6 bg-zinc-50 rounded-2xl border border-black/5">
                    <div class="flex items-start justify-between mb-3">
                        <div>
                            <h3 class="font-bold text-lg">${contact.name}</h3>
                            <a href="mailto:${contact.email}" class="text-sm text-zinc-500 hover:text-black transition-colors">${contact.email}</a>
                        </div>
                        <span class="text-xs text-zinc-400">${new Date(contact.created_at).toLocaleString('zh-CN')}</span>
                    </div>
                    <p class="text-zinc-700">${contact.message}</p>
                </div>
            `).join('');
        }

        document.getElementById('btn-contacts').addEventListener('click', () => {
            loadContacts();
        });

        loadProjects();
    </script>
</body>
</html>
